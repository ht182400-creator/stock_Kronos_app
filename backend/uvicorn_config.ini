[loggers]
keys=root,uvicorn,uvicorn.error,uvicorn.access

[handlers]
keys=default,access

[formatters]
keys=default,access

[logger_root]
level=INFO
handlers=default

[logger_uvicorn]
level=INFO
handlers=default
qualname=uvicorn
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=default
qualname=uvicorn.error
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=access
qualname=uvicorn.access
propagate=0

[handler_default]
class=StreamHandler
level=INFO
formatter=default
args=(sys.stderr,)

[handler_access]
class=StreamHandler
level=INFO
formatter=access
args=(sys.stdout,)

[formatter_default]
format=%(asctime)s [%(levelname)s] %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_access]
# Apache common log format + timestamp
datefmt=%Y-%m-%d %H:%M:%S
